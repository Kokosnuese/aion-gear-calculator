<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<title>Aion 4 Builder</title>

<link rel="stylesheet" href="css/main.css">

<link rel="stylesheet" href="css/calculator.css">

</head>

<body>

<header>

<div class="logo">

AION 4 BUILDER

</div>

</header>

<div class="toolbar">

<select id="classSelector">

</select>

</div>

<div class="build-bar">

<button>Set 1</button>

<button>+ New Set</button>

</div>

<div class="tab-bar">

<button class="active">
Characteristics
</button>

<button>
Amplification
</button>

<button>
Comparison
</button>

</div>

<div class="calculator">

<div class="equipment-panel">

<script src="js/itemSearch.js"></script>

<script src="js/components/tooltip.js"></script>

<script src="js/ui.js"></script>

<div id="itemModal">

    <div id="itemModalContent">

        <input
        id="itemSearchInput"

        </div>

    </div>
