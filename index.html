<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<title>Aion Gear Calculator</title>

<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/calculator.css">

</head>

<body>

<header>

<div class="logo">

AION 4 BUILDER

</div>

</header>

<div class="toolbar">

<select id="classSelector">

</select>

</div>

<div class="build-bar">

<button>Set 1</button>

<button>+ New Set</button>

</div>

<div class="tab-bar">

<button class="active">
Characteristics
</button>

<button>
Amplification
</button>

<button>
Comparison
</button>

</div>

<div class="calculator">

<div class="equipment-panel">

<h2>Equipment</h2>

<div class="equipment-panel">

    <div class="character-header">

        <h2 id="currentClass">
            Gladiator
        </h2>

    </div>

<div class="gear-layout">

    <div id="leftGearColumn">

    </div>

    <div class="character-area">

        <img
        src="assets/ui/character.png"
        id="characterImage">

    </div>

    <div id="rightGearColumn">

    </div>

</div>

</div>

</div>

<div class="stats-panel">

<h2>Character Stats</h2>

<div id="statsList">

</div>

</div>

</div>
<script src="js/dataService.js"></script>

<script src="js/itemSearch.js"></script>

<script src="js/gearEngine.js"></script>

<script src="js/statsRenderer.js"></script>

<script src="js/uiUpdater.js"></script>

<script src="js/equipmentManager.js"></script>

<script src="js/buildManager.js"></script>

<script src="js/itemModal.js"></script>

<script src="js/components/equipmentSlot.js"></script>

<script src="js/components/tooltip.js"></script>

<script src="js/classManager.js"></script>

<script src="js/ui.js"></script>

<script src="js/app.js"></script>
<div id="itemModal">

    <div id="itemModalContent">

        <input
        id="itemSearchInput"
        type="text"
        placeholder="Search Item">

        <button
        id="closeModal">

            Close

        </button>

        <div id="itemResults">

        </div>

    </div>

</div>
<div id="tooltip"></div>
</body>

</html>
